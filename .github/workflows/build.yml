name: Build APK

on:
  push:
    branches: [ Main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Generate Keystore
        run: |
          mkdir -p TMessagesProj/config
          rm -f TMessagesProj/config/release.keystore
          keytool -genkeypair -alias "androidkey" -keypass "android" -keystore TMessagesProj/config/release.keystore -storepass "android" -dname "CN=MyTelegram,OU=Mobile,O=MyApp,L=Dhaka,ST=Dhaka,C=BD" -keyalg RSA -keysize 2048 -validity 10000

      - name: Install NDK & CMake
        run: |
          yes | sdkmanager "ndk;27.2.12479018" "cmake;3.10.2.4988404"

      # 🛠️ এই স্টেপটি গিটহাব সিক্রেটস থেকে আইডি ও হ্যাশ নিয়ে local.properties-এ জমা করবে
      - name: Create local.properties with secrets
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "TELEGRAM_APP_ID=${{ secrets.TELEGRAM_APP_ID }}" >> local.properties
          echo "TELEGRAM_APP_HASH=${{ secrets.TELEGRAM_APP_HASH }}" >> local.properties

      # 🔒 ফায়ারবেস কনফিগারেশনের জন্য জেসন ফাইল প্লেস করা
      - name: Decode and place google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > TMessagesProj/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew clean :TMessagesProj_App:assembleAfatRelease -x lint -x test --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: MyTelegram-APK
          path: "**/build/outputs/apk/**/*.apk"
          retention-days: 30
          
